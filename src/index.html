<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CSP: allows fetch to Flask on localhost, and Chart.js from CDN -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline' 'unsafe-eval';
             connect-src http://127.0.0.1:5000;
             script-src  'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net;
             img-src     'self' data: blob:;">
  <title>NeoWallet</title>
  <link rel="stylesheet" href="index.css">
  <!-- Chart.js for the Reports page -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-menu-icon lucide-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 5h16"/>
          <path d="M4 12h16"/>
          <path d="M4 19h16"/>
        </svg>
      </span>
      <span class="logo-text">Menu</span>
    </div>  
<nav>
      <a class="nav-item active" data-page="dashboard">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </span>
        Dashboard
      </a>
      <a class="nav-item" data-page="transactions">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </span>
        Transactions
      </a>
      <a class="nav-item" data-page="reports">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6"  y1="20" x2="6"  y2="14"/>
            <line x1="2"  y1="20" x2="22" y2="20"/>
          </svg>
        </span>
        Reports
      </a>
      <a class="nav-item" data-page="budgets">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-badge-dollar-sign-icon lucide-badge-dollar-sign">
            <path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/>
            <path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/>
          </svg>
        </span>
        Budgets
      </a>
      <a class="nav-item" data-page="settings">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </span>
        Settings
      </a>
    </nav>
  </aside>

  <!-- ═══ MAIN CONTENT ═══ -->
  <main class="main-content">

    <!-- Full-screen loader shown while Flask starts up -->
    <div id="loading-screen" class="loading-screen">
      <div class="spinner"></div>
      <p>Starting backend…</p>
    </div>

    <div id="page-dashboard"    class="page hidden"></div>
    <div id="page-transactions" class="page hidden"></div>
    <div id="page-reports"      class="page hidden"></div>
    <div id="page-budgets"      class="page hidden"></div>
    <div id="page-settings"     class="page hidden"></div>

  </main>

  <!-- ═══ ADD / EDIT MODAL ═══ -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Add Expense</h3>
        <button id="modal-close" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="trans-id">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="trans-title" placeholder="e.g. Keells Super">
        </div>
        <div class="form-group">
          <label>Amount (LKR)</label>
          <input type="number" id="trans-amount" placeholder="0" min="0" step="1">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="trans-category">
            <option>Groceries</option>
            <option>Utilities</option>
            <option>Transport</option>
            <option>Dining</option>
            <option>Shopping</option>
            <option>Healthcare</option>
            <option>Entertainment</option>
            <option>Education</option>
            <option>Sports</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="trans-date">
        </div>
        <div class="form-group">
          <label>Note (optional)</label>
          <input type="text" id="trans-note" placeholder="Add a note…">
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-cancel" class="btn-secondary">Cancel</button>
        <button id="btn-save"   class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
