<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CSP: allows fetch to Flask on localhost, and Chart.js from CDN -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline';
             connect-src http://127.0.0.1:5000;
             script-src  'self' 'unsafe-inline';
             img-src     'self' data: blob:;">
  <title>NeoWallet</title>
  <link rel="stylesheet" href="index.css">
  <!-- Chart.js for the Reports page -->
  <script src="chart.min.js"></script>
</head>
<body>

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 5h16"/>
          <path d="M4 12h16"/>
          <path d="M4 19h16"/>
        </svg>
      </span>
      <span class="logo-text">Menu</span>
    </div>  
<nav>
      <a class="nav-item active" data-page="dashboard">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </span>
        Dashboard
      </a>
      <a class="nav-item" data-page="transactions">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </span>
        Transactions
      </a>
      <a class="nav-item" data-page="reports">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6"  y1="20" x2="6"  y2="14"/>
            <line x1="2"  y1="20" x2="22" y2="20"/>
          </svg>
        </span>
        Reports
      </a>
      <a class="nav-item" data-page="budgets">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/>
            <path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/>
            <path d="M12 18V6"/>
          </svg>
        </span>
        Budgets
      </a>
      <a class="nav-item" data-page="settings">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </span>
        Settings
      </a>
    </nav>
  </aside>

  <!-- ═══ MAIN CONTENT ═══ -->
  <main class="main-content">

    <!-- Full-screen loader shown while Flask starts up -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-logo">
        <span class="loading-neo">Neo</span>
        <span class="loading-wallet">wallet</span>
      </div>
      <div class="loading-bar-wrap">
        <div class="loading-bar-fill" id="loading-bar"></div>
      </div>
    </div>

    <div id="page-dashboard"    class="page hidden"></div>
    <div id="page-transactions" class="page hidden"></div>
    <div id="page-reports"      class="page hidden"></div>
    <div id="page-budgets"      class="page hidden"></div>
    <div id="page-settings"     class="page hidden"></div>

  </main>

  <!-- ═══ ADD / EDIT MODAL ═══ -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Add Expense</h3>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="trans-id">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="trans-title" placeholder="e.g. Keells Super">
        </div>
        <div class="form-group">
          <label>Amount (LKR)</label>
          <div class="num-wrap">
            <input type="number" id="trans-amount" placeholder="0" min="0">
            <div class="num-btns">
              <button class="num-btn" onclick="adjNum('trans-amount', 100)" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
              </button>
              <button class="num-btn" onclick="adjNum('trans-amount', -100)" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Category</label>
          <div class="cdd" id="cdd-trans-category" data-value="Groceries">
            <div class="cdd-trigger">
              <span class="cdd-label">Groceries</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="cdd-menu">
              <div class="cdd-item sel" data-value="Groceries">Groceries</div>
              <div class="cdd-item" data-value="Utilities">Utilities</div>
              <div class="cdd-item" data-value="Transport">Transport</div>
              <div class="cdd-item" data-value="Dining">Dining</div>
              <div class="cdd-item" data-value="Shopping">Shopping</div>
              <div class="cdd-item" data-value="Healthcare">Healthcare</div>
              <div class="cdd-item" data-value="Entertainment">Entertainment</div>
              <div class="cdd-item" data-value="Education">Education</div>
              <div class="cdd-item" data-value="Sports">Sports</div>
              <div class="cdd-item" data-value="Other">Other</div>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Date</label>
          <div class="datepicker" id="dp-trans-date">
            <div class="dp-trigger" id="dp-trigger-trans-date">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8"  y1="2" x2="8"  y2="6"/>
                <line x1="3"  y1="10" x2="21" y2="10"/>
              </svg>
              <span id="dp-display-trans-date">Select date</span>
            </div>
          </div>
          <input type="hidden" id="trans-date" value="">
        </div>
        <div class="form-group">
          <label>Note (optional)</label>
          <input type="text" id="trans-note" placeholder="Add a note...">
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-cancel" class="btn-secondary">Cancel</button>
        <button id="btn-save"   class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>

  <!-- ═══ CONFIRM MODAL ═══ -->
  <div id="confirm-overlay" class="modal-overlay hidden">
    <div class="modal" style="width:380px">
      <div class="modal-header">
        <h3 id="confirm-title">Are you sure?</h3>
      </div>
      <div class="modal-body" style="padding:20px 22px 8px">
        <p id="confirm-message" style="color:var(--text-muted);font-size:14px;line-height:1.6"></p>
      </div>
      <div class="modal-footer">
        <button id="confirm-cancel" class="btn-secondary">Cancel</button>
        <button id="confirm-ok"     class="btn-danger"    style="padding:10px 18px">Delete</button>
      </div>
    </div>
  </div>

</body>
</html>
